<!doctype html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VERIFY & SPIN | AdmiralBet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: 'Montserrat', Arial, sans-serif;
    }

    body {
      background-image: url('/bugarska/aprilLP/fotke/casino1.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      overflow: hidden;
    }

    @media (max-width: 768px) {
      body {
        background-image: url('/bugarska/aprilLP/fotke/casino2.png');
        background-position: center top;
      }
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 30% 20%, rgba(255, 212, 0, 0.20), transparent 34%),
        linear-gradient(90deg, rgba(0,0,0,0.68), rgba(0,0,0,0.28), rgba(0,0,0,0.42));
      z-index: 0;
    }

    .content-box {
      position: absolute;
      top: 12%;
      left: 6%;
      width: 44%;
      z-index: 2;
    }

    .main-heading {
      font-size: 4.8rem;
      font-weight: 900;
      line-height: 0.95;
      margin: 0;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: linear-gradient(180deg, #fff8a8, #ffd700, #ffad00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 5px 12px rgba(0,0,0,0.8));
    }

    .sub-text {
      margin-top: 1.25rem;
      font-size: 1.48rem;
      font-weight: 800;
      line-height: 1.4;
      color: #ffffff;
      letter-spacing: 0.4px;
      max-width: 650px;
      text-shadow:
        0 2px 6px rgba(0,0,0,0.95),
        0 0 14px rgba(0,0,0,0.65);
    }

    .highlight {
      background: linear-gradient(180deg, #fff27a, #ffd400, #ffb300);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.85));
    }

    .mini-points {
      margin-top: 1.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
    }

    .mini-point {
      padding: 0.72rem 1rem;
      border-radius: 14px;
      background: rgba(0,0,0,0.42);
      border: 1px solid rgba(255, 215, 0, 0.42);
      color: #ffe766;
      font-size: 0.95rem;
      font-weight: 900;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 22px rgba(0,0,0,0.32);
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    .cta-wrapper {
      position: fixed;
      bottom: 20px;
      left: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 3;
      padding: 0 14px;
      box-sizing: border-box;
    }

    .cta-button {
      width: 100%;
      max-width: 440px;
      padding: 1.18rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.03rem;
      font-weight: 900;
      border-radius: 16px;
      text-decoration: none;
      text-transform: uppercase;
      color: #050505;
      background: linear-gradient(180deg, #fff27a, #ffd400, #ffb300);
      box-shadow:
        0 10px 28px rgba(0,0,0,0.58),
        inset 0 1px 0 rgba(255,255,255,0.65);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      letter-spacing: 0.35px;
    }

    .cta-button:active {
      transform: scale(0.96);
      box-shadow: 0 6px 18px rgba(0,0,0,0.5);
    }

    @media (max-width: 768px) {
      .bg-overlay {
        background:
          radial-gradient(circle at 50% 10%, rgba(255, 212, 0, 0.20), transparent 32%),
          linear-gradient(180deg, rgba(0,0,0,0.62), rgba(0,0,0,0.22), rgba(0,0,0,0.58));
      }

      .content-box {
        top: 7%;
        left: 50%;
        width: 90%;
        transform: translateX(-50%);
        text-align: center;
      }

      .main-heading {
        font-size: 2.85rem;
        line-height: 0.98;
      }

      .sub-text {
        margin-top: 1rem;
        font-size: 1.08rem;
        line-height: 1.45;
        letter-spacing: 0.25px;
      }

      .mini-points {
        justify-content: center;
        margin-top: 1rem;
      }

      .mini-point {
        font-size: 0.78rem;
        padding: 0.58rem 0.78rem;
        border-radius: 12px;
      }

      .cta-wrapper {
        bottom: 14px;
      }

      .cta-button {
        max-width: 390px;
        font-size: 0.92rem;
        padding: 1rem;
        border-radius: 14px;
      }
    }
  </style>
</head>

<body>

  <div class="bg-overlay"></div>

  <div class="content-box">
    <h1 class="main-heading">
      VERIFY<br>& SPIN
    </h1>

    <div class="sub-text">
      Register & verify your account<br>
      <span class="highlight">Unlock up to 1,000 Free Spins</span>
    </div>

    <div class="mini-points">
      <div class="mini-point">No Deposit</div>
    </div>
  </div>

  <div class="cta-wrapper">
    <a href="https://admiralbetbgtrack.com/th6mh3lyf" class="cta-button" id="ctaLink">
      Register, Verify & Spin
    </a>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);

      const subid = params.get('subid') || '';
      const placementId = params.get('placement_id') || '';

      const affilkaUrl = new URL('https://admiralbetbgtrack.com/th6mh3lyf');

      affilkaUrl.searchParams.set('s1', subid);
      affilkaUrl.searchParams.set('placement_id', placementId);
      affilkaUrl.searchParams.set('source', 'propeller');
      affilkaUrl.searchParams.set('promo', 'verify_spin_1000fs');

      document.getElementById('ctaLink').href = affilkaUrl.toString();
    })();
  </script>

</body>
</html>
