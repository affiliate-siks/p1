name: Build Marketing Reports

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
         

      - name: Install dependencies
        run: npm install

      - name: Ensure reports directory exists
        run: mkdir -p MarketingTIm/reports

      - name: Build reports
        run: node MarketingTIm/scripts/build.js

      - name: Commit generated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MarketingTIm/reports
          git diff --cached --quiet || git commit -m "Auto-build marketing reports"

      - name: Push changes
        run: git push
