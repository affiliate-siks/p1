body {

}

@media (max-width: 768px) {

}

/* 20% DARK OVERLAY */
.bg-overlay {
  position: fixed;
  inset: 0;

}

.full-link {
  position: fixed;
  inset: 0;
  z-index: 1;
}

.content-box {

  left: 6%;

@media (max-width: 768px) {
  .content-box {
    top: 12%;
    left: 50%;

    transform: translateX(-50%);
    text-align: center;
  }
}

.main-heading {
  font-size: 5rem;
  font-weight: 900;
  margin: 0;
  letter-spacing: 4px;

  background: linear-gradient(
    180deg,
    #ffffff 0%,
    #fff7c7 12%,
    #ffe85a 28%,
    #ffd000 44%,
    #ffb800 62%,
    #ff9900 78%,
    #fff0a6 100%
  );

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  -webkit-text-stroke: 2px #ffffff;

  text-shadow:
    0 4px 15px rgba(0,0,0,0.9),
    0 0 30px rgba(255,215,0,1),
    0 0 60px rgba(255,200,0,0.8);
}

.sub-text {

  font-weight: 900;
  letter-spacing: 2px;
  color: #ffffff;
  text-shadow: 0 4px 20px rgba(0,0,0,0.9);
  line-height: 1.3;
}

.limited-wrap {
  margin-top: 3rem;
  width: 100%;
  max-width: 420px;
}

.bar-shell {
  height: 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.25);
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, #ffe680, #ffd000, #ffb000);
  animation: emptyBar 6s linear infinite;
}

@keyframes emptyBar {
  from { transform: translateX(0); }
  to   { transform: translateX(-100%); }
}

.limit-text {
  margin-top: 10px;
  font-size: 0.9rem;
  letter-spacing: 1.5px;
  font-weight: 700;
  color: rgba(255,255,255,0.9);
}

.cta-wrapper {
  position: fixed;
  bottom: 5%;
  right: 5%;
  z-index: 2;
}

@media (max-width: 768px) {
  .cta-wrapper {
    left: 50%;
    right: auto;
    transform: translateX(-50%);
    bottom: 10%;
  }
}

.cta-button {
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;

  padding: 1.2rem 3rem;
  font-size: 1.5rem;
  font-weight: 900;
  border-radius: 999px;
  text-decoration: none;
  color: #000;

  background: linear-gradient(180deg, #fff066, #ffd400);
  box-shadow:
    0 10px 30px rgba(0,0,0,0.6),
    0 0 30px rgba(255,212,0,0.9);
}

@media (max-width: 768px) {
  .main-heading { font-size: 3rem; }
  .sub-text { font-size: 1.4rem; }
  .cta-button { font-size: 1.2rem; padding: 1rem 2rem; }
}
</style>

<body>

<div class="bg-overlay"></div>

<a href="https://admiralbetbgtrack.com/tklg7gbbv" class="full-link"></a>

  </div>

</div>

</html>
