<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Dashboard</title>

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#0b0b0d;
  color:#fff;
}

.container {
  max-width:1200px;
  margin:40px auto;
  padding:20px;
}

/* HEADER */
.header {
  background: linear-gradient(135deg,#1a1a2e,#3a0f2f,#f36a2e);
  padding:30px;
  border-radius:20px;
}

.header h1 {
  margin:0;
}

.header-buttons {
  margin-top:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn {
  padding:10px 16px;
  border-radius:20px;
  background:#1a1a1f;
  border:1px solid #2a2a31;
  cursor:pointer;
}

.btn.primary {
  background:#f36a2e;
}

/* CARDS */
.card {
  background:#141418;
  border:1px solid #2a2a31;
  border-radius:16px;
  padding:20px;
  margin-top:20px;
}

/* FILTERS */
.filters {
  display:grid;
  gap:10px;
}

input {
  padding:12px;
  background:#1a1a1f;
  border:none;
  border-radius:10px;
  color:#fff;
}

/* STATS */
.stats {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-top:20px;
}

.stat {
  background:#141418;
  padding:20px;
  border-radius:16px;
  border:1px solid #2a2a31;
}

.stat h2 {
  margin:0;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:12px;
  border-bottom:1px solid #2a2a31;
}

tr:hover {
  background:#1a1a1f;
  cursor:pointer;
}

/* EMPLOYEE */
.employee {
  padding:12px;
  border-bottom:1px solid #2a2a31;
  cursor:pointer;
}

.employee:hover {
  background:#1a1a1f;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>Instagram Reporting Dashboard</h1>

    <div class="header-buttons">
      <div class="btn" onclick="resetFilters()">Reset filtera</div>
      <div class="btn primary" onclick="window.location.href='new-report.html'">Novi izvještaj</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="card">
    <h3>Filteri</h3>
    <div class="filters">
      <input id="profileFilter" placeholder="Profil">
      <input id="ownerFilter" placeholder="Osoba">
      <input type="date" id="fromDate">
      <input type="date" id="toDate">
      <button class="btn primary" onclick="applyFilters()">Primijeni</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><h2 id="totalReports">0</h2><p>Ukupno reporta</p></div>
    <div class="stat"><h2 id="totalProfiles">0</h2><p>Ukupno profila</p></div>
    <div class="stat"><h2 id="totalOwners">0</h2><p>Ukupno osoba</p></div>
  </div>

  <!-- TABLE -->
  <div class="card">
    <h3>Sačuvani izvještaji</h3>
    <table>
      <thead>
        <tr>
          <th>Datum</th>
          <th>Profil</th>
          <th>Osoba</th>
          <th>Period</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- EMPLOYEE OVERVIEW -->
  <div class="card">
    <h3>Overview po zaposlenima</h3>
    <div id="employeeOverview"></div>
  </div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwfjiqyD5GZVT0k5UOF20y6tYfEnMBHODuu2rYfoVZ0n_kUULmOb6K9tiCJqEm0GMU/exec";

let reports = [];

async function loadReports() {
  const res = await fetch(API + "?action=listReports");
  const data = await res.json();

  reports = data.reports || [];
  render();
}

function render(filtered = reports) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  let profiles = new Set();
  let owners = new Set();
  let employeeMap = {};

  filtered.forEach(r => {
    profiles.add(r.profile_name);
    owners.add(r.owner_name);

    if (!employeeMap[r.owner_name]) {
      employeeMap[r.owner_name] = { count: 0 };
    }
    employeeMap[r.owner_name].count++;

    const tr = document.createElement("tr");

    tr.onclick = () => {
      window.location.href = `reports/${r.slug}.html`;
    };

    tr.innerHTML = `
      <td>${r.created_at ? r.created_at.split("T")[0] : "-"}</td>
      <td>${r.profile_name}</td>
      <td>${r.owner_name || "-"}</td>
      <td>${r.period_start} → ${r.period_end}</td>
      <td>${r.status}</td>
    `;

    tbody.appendChild(tr);
  });

  document.getElementById("totalReports").innerText = filtered.length;
  document.getElementById("totalProfiles").innerText = profiles.size;
  document.getElementById("totalOwners").innerText = owners.size;

  // EMPLOYEE OVERVIEW
  const container = document.getElementById("employeeOverview");
  container.innerHTML = "";

  Object.keys(employeeMap).forEach(name => {
    const div = document.createElement("div");
    div.className = "employee";

    div.innerHTML = `
      <strong>${name || "N/A"}</strong>
      ${employeeMap[name].count} reporta
    `;

    div.onclick = () => {
      window.location.href = `employee.html?name=${encodeURIComponent(name)}`;
    };

    container.appendChild(div);
  });
}

function applyFilters() {
  const p = document.getElementById("profileFilter").value.toLowerCase();
  const o = document.getElementById("ownerFilter").value.toLowerCase();
  const from = document.getElementById("fromDate").value;
  const to = document.getElementById("toDate").value;

  const filtered = reports.filter(r => {
    const matchProfile = r.profile_name.toLowerCase().includes(p);
    const matchOwner = (r.owner_name || "").toLowerCase().includes(o);

    const date = r.created_at ? r.created_at.split("T")[0] : "";

    const matchFrom = from ? date >= from : true;
    const matchTo = to ? date <= to : true;

    return matchProfile && matchOwner && matchFrom && matchTo;
  });

  render(filtered);
}

function resetFilters() {
  document.getElementById("profileFilter").value = "";
  document.getElementById("ownerFilter").value = "";
  document.getElementById("fromDate").value = "";
  document.getElementById("toDate").value = "";
  render();
}

loadReports();
</script>

</body>
</html>
