<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admiral Club Montenegro - POSTANI DIO LEGENDE</title>
    
    <!-- OG tagovi za Facebook (i druge) - crawler ih vidi jer ne izvršava JS -->
    <meta property="og:title" content="POSTANI DIO LEGENDE - GREAT GATSBY DAY U MOSKVI I DIAMONDU!">
    <meta property="og:description" content="Da li si spreman za dan o kojem će se pričati? 15. marta, AdmiralClubovi Diamond i Moskva te vraćaju u zlatno doba glamura! 💰 Do 5.000 € u jednom danu! Svakog sata šansa za dobitak do 500€! Veliki GREAT GATSBY JACKPOT!">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://www.instagram.com/p/DVx3z7MCP-j/?img_index=1">
    <meta property="og:site_name" content="Instagram">
    
    <!-- ZAMIJENI OVO SA STVARNOM SLIKOM IZ POSTA (otvori Instagram post → desni klik na sliku → Copy image address) -->
    <!-- Ako ne zamijeniš, Facebook će možda pokušati sam da izvuče sliku, ali bolje staviti direktnu -->
    <meta property="og:image" content="https://placehold.co/1200x630/png?text=Great+Gatsby+Admiral+Club">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    
    <!-- Dodatni tagovi za bolji preview -->
    <meta name="description" content="Admiral Club Montenegro - Great Gatsby Day specijalni jackpot!">
    <meta name="robots" content="noindex, nofollow">

    <!-- Meta refresh kao backup (ako JS ne radi) -->
    <meta http-equiv="refresh" content="0; url=https://www.instagram.com/p/DVx3z7MCP-j/?img_index=1">
    
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="loader">
        <p>Preusmjeravam na Instagram post...</p>
        <p>Molim sačekaj 1 sekundu...</p>
    </div>

    <!-- JavaScript redirect - Facebook crawler OVO NE IZVRŠAVA, pa vidi OG tagove iznad i pokazuje pravi preview! -->
    <!-- Pravi korisnik (browser) se odmah preusmjeri -->
    <script>
        // Instant redirect
        window.location.replace("https://www.instagram.com/p/DVx3z7MCP-j/?img_index=1");
        
        // Dodatni fallback
        setTimeout(function() {
            window.location.href = "https://www.instagram.com/p/DVx3z7MCP-j/?img_index=1";
        }, 500);
    </script>
</body>
</html>
