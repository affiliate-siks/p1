<!doctype html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VERIFY & SPIN | AdmiralBet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: 'Montserrat', Arial, sans-serif;
    }

    body {
      background-image: url('/bugarska/aprilLP/fotke/casino1.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      overflow: hidden;
    }

    @media (max-width: 768px) {
      body {
        background-image: url('/bugarska/aprilLP/fotke/casino2.png');
        background-position: center top;
      }
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 30% 20%, rgba(255, 212, 0, 0.25), transparent 35%),
        linear-gradient(90deg, rgba(0,0,0,0.78), rgba(0,0,0,0.4), rgba(0,0,0,0.6));
      z-index: 0;
    }

    .content-box {
      position: absolute;
      top: 12%;
      left: 6%;
      width: 48%;
      z-index: 2;
    }

    .main-heading {
      font-size: 4.6rem;
      font-weight: 900;
      line-height: 0.95;
      margin: 0;
      text-transform: uppercase;
      background: linear-gradient(180deg, #fff8a8, #ffd700, #ffad00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 5px 12px rgba(0,0,0,0.9));
    }

    .sub-text {
      margin-top: 1rem;
      font-size: 1.25rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,1);
    }

    /* 🔥 HERO BROJ */
    .big-offer {
      margin-top: 0.6rem;
      display: inline-block;
      padding: 1rem 1.4rem;
      border-radius: 20px;

      background: rgba(0,0,0,0.75);
      border: 2px solid rgba(255,215,0,0.7);

      box-shadow:
        0 15px 40px rgba(0,0,0,0.8),
        0 0 40px rgba(255, 200, 0, 0.25),
        inset 0 1px 0 rgba(255,255,255,0.2);

      backdrop-filter: blur(8px);
    }

    .big-offer .small {
      font-size: 0.9rem;
      color: #fff;
      opacity: 0.85;
      margin-right: 6px;
      text-transform: lowercase;
    }

    .big-offer .huge {
      font-size: 3.8rem; /* 🔥 GLAVNO */
      font-weight: 900;
      letter-spacing: 1px;

      background: linear-gradient(180deg, #fff9b0, #ffd400, #ff9900);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      -webkit-text-stroke: 1px rgba(0,0,0,0.6);

      text-shadow:
        0 4px 10px rgba(0,0,0,1),
        0 0 25px rgba(255, 200, 0, 0.5),
        0 0 50px rgba(255, 170, 0, 0.3);
    }

    .mini-points {
      margin-top: 1rem;
    }

    .mini-point {
      display: inline-block;
      padding: 0.6rem 0.9rem;
      border-radius: 12px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,215,0,0.5);
      color: #ffe766;
      font-size: 0.9rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .cta-wrapper {
      position: fixed;
      bottom: 20px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 3;
      padding: 0 14px;
    }

    .cta-button {
      width: 100%;
      max-width: 440px;
      padding: 1.2rem;
      text-align: center;
      font-size: 1rem;
      font-weight: 900;
      border-radius: 16px;
      text-decoration: none;
      text-transform: uppercase;
      color: #000;
      background: linear-gradient(180deg, #fff27a, #ffd400, #ffb300);
      box-shadow: 0 10px 28px rgba(0,0,0,0.6);
    }

    .cta-button:active {
      transform: scale(0.96);
    }

    /* 📱 MOBILE */
    @media (max-width: 768px) {
      .content-box {
        top: 7%;
        left: 50%;
        width: 92%;
        transform: translateX(-50%);
        text-align: center;
      }

      .main-heading {
        font-size: 2.6rem;
      }

      .big-offer .huge {
        font-size: 2.2rem;
      }

      .cta-button {
        font-size: 0.9rem;
      }
    }
  </style>
</head>

<body>

  <div class="bg-overlay"></div>

  <div class="content-box">
    <h1 class="main-heading">
      VERIFY<br>& SPIN
    </h1>

    <div class="sub-text">
      Register & verify your account
    </div>

    <div class="big-offer">
      <span class="small">do</span>
      <span class="huge">1000 SPINOVA</span>
    </div>

    <div class="mini-points">
      <div class="mini-point">No Deposit</div>
    </div>
  </div>

  <div class="cta-wrapper">
    <a href="https://admiralbetbgtrack.com/th6mh3lyf" class="cta-button" id="ctaLink">
      Register, Verify & Spin
    </a>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);

      const subid = params.get('subid') || '';
      const placementId = params.get('placement_id') || '';

      const affilkaUrl = new URL('https://admiralbetbgtrack.com/th6mh3lyf');

      affilkaUrl.searchParams.set('s1', subid);
      affilkaUrl.searchParams.set('placement_id', placementId);
      affilkaUrl.searchParams.set('source', 'propeller');
      affilkaUrl.searchParams.set('promo', 'verify_spin_1000fs');

      document.getElementById('ctaLink').href = affilkaUrl.toString();
    })();
  </script>

</body>
</html>
