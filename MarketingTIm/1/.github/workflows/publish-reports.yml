name: Publish Instagram Reports

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch reports JSON
        run: |
          mkdir -p data
          curl -L "${{ secrets.REPORTS_SOURCE_URL }}" -o data/raw-response.json
          cat data/raw-response.json

      - name: Build static pages
        run: |
          node scripts/build-reports.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Daily reports publish"
          git push
